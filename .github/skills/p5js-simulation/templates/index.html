<!doctype html>
<html lang="ja">
  <head>
    <title>{% title %}</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link href="../lib/bootstrap.min.css" rel="stylesheet" />
    <link href="./css/style.css" rel="stylesheet" />
  </head>

  <body class="bg-dark">
    <nav
      class="navbar navbar-expand-md bg-dark border-bottom border-bottom-dark fixed-top"
      data-bs-theme="dark"
      id="navBar"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="https://bicpema.com/">Bicpema</a>
        <span class="text-light fw-lighter">{% title %}</span>
      </div>
    </nav>

    <div class="container-fluid" id="p5Container">
      <div id="p5Canvas"></div>

      <!-- <div id="graph" class="rounded border border-1">
            <canvas id="graphCanvas"></canvas>
        </div> -->
    </div>

    <!-- スクリプトはボディ末尾に配置。p5.js → class.js → function.js → elementFunction.js → init.js → index.js の順に読み込む -->
    <script src="../lib/bootstrap.bundle.min.js"></script>
    <script src="../lib/p5.min.js"></script>
    <script src="./js/class.js"></script>
    <script src="./js/logic.js"></script>
    <script src="./js/elementFunction.js"></script>
    <script src="./js/init.js"></script>
    <script src="./js/index.js"></script>
  </body>
</html>
