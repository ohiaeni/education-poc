<!doctype html>
<html lang="ja">
  <head>
    <title>垂直抗力のシミュレーション</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link href="../lib/bootstrap.min.css" rel="stylesheet" />
    <link href="./css/style.css" rel="stylesheet" />
  </head>

  <body class="bg-dark">
    <nav
      class="navbar navbar-expand-md bg-dark border-bottom border-bottom-dark fixed-top"
      data-bs-theme="dark"
      id="navBar"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Bicpema</a>
        <span class="text-light fw-lighter">垂直抗力のシミュレーション</span>
      </div>
    </nav>

    <div class="container-fluid" id="p5Container">
      <div id="p5Canvas"></div>
      <div id="legend">
        <div class="legend-item">
          <span
            class="legend-line"
            style="background: #1e1e1e; color: #1e1e1e"
          ></span>
          <span>重力 (mg)</span>
        </div>
        <div class="legend-item">
          <span
            class="legend-line"
            style="background: #0064c8; color: #0064c8"
          ></span>
          <span>斜面方向成分 (mg sinθ)</span>
        </div>
        <div class="legend-item">
          <span
            class="legend-line"
            style="background: #00a050; color: #00a050"
          ></span>
          <span>斜面垂直成分 (mg cosθ)</span>
        </div>
        <div class="legend-item">
          <span
            class="legend-line"
            style="background: #c80000; color: #c80000"
          ></span>
          <span>垂直抗力 (N)</span>
        </div>
      </div>
    </div>

    <div class="container-fluid" id="controls">
      <div class="row justify-content-center mb-2">
        <div class="col-auto">
          <button id="startBtn" class="btn btn-outline-light">スタート</button>
        </div>
        <div class="col-auto">
          <button id="stopBtn" class="btn btn-outline-secondary">
            ストップ
          </button>
        </div>
      </div>
      <div class="row justify-content-center g-2">
        <div class="col-auto">
          <div class="input-group input-group-sm">
            <span
              class="input-group-text bg-secondary text-white border-secondary"
              >角度 (°)</span
            >
            <input
              type="number"
              id="angleInput"
              class="form-control bg-dark text-white border-secondary"
              value="30"
              min="1"
              max="80"
              step="1"
            />
          </div>
        </div>
        <div class="col-auto">
          <div class="input-group input-group-sm">
            <span
              class="input-group-text bg-secondary text-white border-secondary"
              >質量 (kg)</span
            >
            <input
              type="number"
              id="massInput"
              class="form-control bg-dark text-white border-secondary"
              value="1.0"
              min="0.1"
              max="10"
              step="0.1"
            />
          </div>
        </div>
        <div class="col-auto">
          <div class="input-group input-group-sm">
            <span
              class="input-group-text bg-secondary text-white border-secondary"
              >重力加速度 (m/s²)</span
            >
            <input
              type="number"
              id="gravityInput"
              class="form-control bg-dark text-white border-secondary"
              value="9.8"
              min="0.1"
              max="30"
              step="0.1"
            />
          </div>
        </div>
      </div>
    </div>

    <!-- スクリプトはボディ末尾に配置。p5.js → class.js → function.js → elementFunction.js → init.js → index.js の順に読み込む -->
    <script src="../lib/bootstrap.bundle.min.js"></script>
    <script src="../lib/p5.min.js"></script>
    <script src="./js/class.js"></script>
    <script src="./js/function.js"></script>
    <script src="./js/elementFunction.js"></script>
    <script src="./js/init.js"></script>
    <script src="./js/index.js"></script>
  </body>
</html>
