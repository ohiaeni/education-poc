<!doctype html>
<html lang="ja">
  <head>
    <title>斜方投射のシミュレーション</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link href="../lib/bootstrap.min.css" rel="stylesheet" />
    <link href="./css/style.css" rel="stylesheet" />
  </head>

  <body class="bg-dark">
    <nav
      class="navbar navbar-expand-md bg-dark border-bottom border-bottom-dark fixed-top"
      data-bs-theme="dark"
      id="navBar"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Bicpema</a>
        <span class="text-light fw-lighter">斜方投射のシミュレーション</span>
      </div>
    </nav>

    <div class="container-fluid" id="p5Container">
      <div id="p5Canvas"></div>
    </div>

    <div class="container-fluid" id="controls">
      <div class="row justify-content-center mb-2">
        <div class="col-auto">
          <button id="launchBtn" class="btn btn-outline-light">投射する</button>
        </div>
        <div class="col-auto">
          <button id="resetBtn" class="btn btn-outline-secondary">
            リセット
          </button>
        </div>
      </div>
      <div class="row justify-content-center g-2">
        <div class="col-auto">
          <div class="input-group input-group-sm">
            <span
              class="input-group-text bg-secondary text-white border-secondary"
              >初速 (m/s)</span
            >
            <input
              type="number"
              id="velocityInput"
              class="form-control bg-dark text-white border-secondary"
              value="15"
              min="1"
              max="50"
              step="1"
            />
          </div>
        </div>
        <div class="col-auto">
          <div class="input-group input-group-sm">
            <span
              class="input-group-text bg-secondary text-white border-secondary"
              >角度 (°)</span
            >
            <input
              type="number"
              id="angleInput"
              class="form-control bg-dark text-white border-secondary"
              value="30"
              min="1"
              max="89"
              step="1"
            />
          </div>
        </div>
        <div class="col-auto">
          <div class="input-group input-group-sm">
            <span
              class="input-group-text bg-secondary text-white border-secondary"
              >重力加速度 (m/s²)</span
            >
            <input
              type="number"
              id="gravityInput"
              class="form-control bg-dark text-white border-secondary"
              value="9.8"
              min="0.1"
              max="30"
              step="0.1"
            />
          </div>
        </div>
      </div>
    </div>

    <!-- スクリプトはボディ末尾に配置。index.js を ES module として読み込む -->
    <script src="../lib/bootstrap.bundle.min.js"></script>
    <script src="../lib/p5.min.js"></script>
    <script type="module" src="./js/index.js"></script>
  </body>
</html>
